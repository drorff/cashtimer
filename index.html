<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון שכר</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="מחשבון שכר">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏱️</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%234a90e2%22/><text x=%2210%22 y=%2275%22 font-size=%2270%22>⏱️</text></svg>">

    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5f7fa;
            --accent-color: #e67e22;
            --text-color: #333;
            --money-color: #2ecc71;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --break-color: #7f8c8d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--secondary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* כפתור הגדרות */
        .settings-toggle {
            position: absolute;
            top: 15px;
            left: 15px;
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            z-index: 10;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        /* פאנל הגדרות נפתח */
        .settings-panel {
            display: none;
            background: #f9f9f9;
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 1.5rem;
            text-align: right;
        }

        .settings-panel.open {
            display: block;
        }

        .input-group {
            margin-bottom: 1.2rem;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #555;
            font-size: 0.95rem;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1.2rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
            letter-spacing: 1px;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        .results {
            margin-top: 1.5rem;
            padding-top: 1.2rem;
            border-top: 2px solid var(--secondary-color);
        }

        .result-item {
            margin-bottom: 1.2rem;
        }

        .result-label {
            font-size: 0.9rem;
            color: #777;
            margin-bottom: 2px;
        }

        .result-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-color);
            letter-spacing: 1px;
        }

        .rate-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            color: white;
            margin-top: 5px;
            transition: background-color 0.3s;
        }

        .rate-100 { background-color: var(--primary-color); }
        .rate-125 { background-color: var(--accent-color); }
        .rate-150 { background-color: var(--danger-color); }
        .rate-break { background-color: var(--break-color); }

        .countdown {
            font-size: 2.2rem;
            font-family: 'Courier New', Courier, monospace;
        }

        .money-counter {
            font-size: 2.4rem;
            font-family: 'Courier New', Courier, monospace;
            color: var(--money-color);
            font-weight: bold;
        }

        .saved-badge {
            font-size: 0.8rem;
            color: var(--success-color);
            display: block;
            margin-top: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <button id="toggleSettings" class="settings-toggle" title="הגדרות שכר">⚙️</button>

    <h1>מחשבון עבודה ושכר 💰</h1>
    
    <div id="settingsPanel" class="settings-panel">
        <div class="input-group" style="margin-bottom: 0;">
            <label for="hourlyWageInput">שכר בסיס לשעה (₪):</label>
            <input type="number" id="hourlyWageInput" step="0.01" placeholder="115.38" style="font-size: 1.1rem; padding: 8px;">
        </div>
    </div>

    <div class="input-group">
        <label for="arrivalTime">שעת הגעה (HH:MM):</label>
        <input type="text" id="arrivalTime" placeholder="08:00" maxlength="5" inputmode="numeric">
        <span id="saveStatus" class="saved-badge" style="display:none;">✓ נשמר להיום</span>
    </div>

    <div class="input-group">
        <label for="dayOfWeek">יום עבודה</label>
        <select id="dayOfWeek">
            <option value="9">א' - ד' (9 שעות נוכחות)</option>
            <option value="8.5">יום חמישי (8.5 שעות נוכחות)</option>
        </select>
    </div>

    <div class="results">
        <div class="result-item">
            <div class="result-label">רווח מצטבר היום:</div>
            <div id="moneyEarned" class="money-counter">₪ 0.00</div>
            <div id="currentRateBadge" class="rate-badge rate-100">תעריף: 100%</div>
        </div>

        <div class="results-wrapper" style="display: flex; justify-content: space-between; gap: 10px;">
            <div class="result-item" style="flex: 1;">
                <div class="result-label" id="timerLabel">נותר לתקן:</div>
                <div id="timeTimer" class="result-value countdown" style="font-size: 1.5rem;">00:00:00</div>
            </div>
            <div class="result-item" style="flex: 1;">
                <div class="result-label">שעת יציאה:</div>
                <div id="endTime" class="result-value" style="color: var(--primary-color); font-size: 1.5rem;">--:--</div>
            </div>
        </div>
    </div>
</div>

<script>
    const arrivalInput = document.getElementById('arrivalTime');
    const dayInput = document.getElementById('dayOfWeek');
    const endTimeDisplay = document.getElementById('endTime');
    const timeTimerDisplay = document.getElementById('timeTimer');
    const timerLabel = document.getElementById('timerLabel');
    const moneyDisplay = document.getElementById('moneyEarned');
    const currentRateBadge = document.getElementById('currentRateBadge');
    const saveStatus = document.getElementById('saveStatus');
    
    // אלמנטים של תפריט ההגדרות החדש
    const toggleSettingsBtn = document.getElementById('toggleSettings');
    const settingsPanel = document.getElementById('settingsPanel');
    const hourlyWageInput = document.getElementById('hourlyWageInput');

    // שכר ברירת מחדל אם אין משהו שמור
    let baseWage = 115.38; 

    function getTodayString() {
        const today = new Date();
        return `${today.getFullYear()}-${today.getMonth()+1}-${today.getDate()}`;
    }

    // פתיחה וסגירה של פאנל ההגדרות
    toggleSettingsBtn.addEventListener('click', () => {
        settingsPanel.classList.toggle('open');
    });

    // שמירת השכר בהגדרות ישירות למכשיר בזמן שינוי
    hourlyWageInput.addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        if (!isNaN(val) && val > 0) {
            baseWage = val;
            localStorage.setItem('work_calc_wage', val);
            calculate();
        }
    });

    function init() {
        const now = new Date();
        const day = now.getDay(); 
        
        dayInput.value = (day === 4) ? "8.5" : "9";

        // טעינת שכר שעתי מהמכשיר במידה וקיים
        const savedWage = localStorage.getItem('work_calc_wage');
        if (savedWage) {
            baseWage = parseFloat(savedWage);
            hourlyWageInput.value = baseWage;
        } else {
            hourlyWageInput.value = baseWage; // ערך ברירת המחדל הראשוני
        }

        // טעינת שעת כניסה מהמכשיר במידה וקיים
        const savedDate = localStorage.getItem('work_calc_date');
        const savedTime = localStorage.getItem('work_calc_time');
        const todayStr = getTodayString();

        if (savedDate === todayStr && savedTime) {
            arrivalInput.value = savedTime;
            saveStatus.style.display = 'block';
        } else {
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            arrivalInput.value = `${h}:${m}`;
            saveStatus.style.display = 'none';
        }
        
        calculate();
    }

    arrivalInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, ''); 
        if (value.length > 2) {
            value = value.slice(0, 2) + ':' + value.slice(2, 4);
        }
        e.target.value = value;

        if (value.length === 5 && value.includes(':')) {
            localStorage.setItem('work_calc_time', value);
            localStorage.setItem('work_calc_date', getTodayString());
            saveStatus.style.display = 'block';
        } else {
            saveStatus.style.display = 'none';
        }
        calculate();
    });

    function calculate() {
        const val = arrivalInput.value;
        if (!val || val.length < 5 || !val.includes(':')) {
            endTimeDisplay.textContent = "--:--";
            timeTimerDisplay.textContent = "00:00:00";
            moneyDisplay.textContent = "₪ 0.00";
            return;
        }

        let [arrivalH, arrivalM] = val.split(':').map(Number);
        if (arrivalH > 23) arrivalH = 23;
        if (arrivalM > 59) arrivalM = 59;
        
        const presenceHours = parseFloat(dayInput.value); 
        
        const start = new Date();
        start.setHours(arrivalH, arrivalM, 0);

        const totalMinutesToExit = (arrivalH * 60) + arrivalM + (presenceHours * 60);
        const endH = Math.floor(totalMinutesToExit / 60) % 24;
        const endM = Math.floor(totalMinutesToExit % 60);
        endTimeDisplay.textContent = `${String(endH).padStart(2, '0')}:${String(endM).padStart(2, '0')}`;

        updateDynamics(start, endH, endM, presenceHours);
    }

    function updateDynamics(start, endH, endM, presenceHours) {
        const now = new Date();
        if (start > now) start.setDate(start.getDate() - 1); 

        const targetStandardEnd = new Date();
        targetStandardEnd.setHours(endH, endM, 0);
        if (targetStandardEnd < start) targetStandardEnd.setDate(targetStandardEnd.getDate() + 1);

        const breakStart = new Date(start); breakStart.setHours(12, 0, 0);
        const breakEnd = new Date(start); breakEnd.setHours(12, 30, 0);

        let breakMs = 0;
        if (start < breakEnd && now > breakStart) {
            const actualBreakStart = start > breakStart ? start : breakStart;
            const actualBreakEnd = now < breakEnd ? now : breakEnd;
            if (actualBreakEnd > actualBreakStart) {
                breakMs = actualBreakEnd - actualBreakStart;
            }
        }

        const totalHoursPassedGross = (now - start) / (1000 * 60 * 60);
        const breakHours = breakMs / (1000 * 60 * 60);
        const totalHoursPassedNet = Math.max(0, totalHoursPassedGross - breakHours);

        let standardPaidHours = presenceHours;
        if (start < breakEnd) {
            standardPaidHours = Math.max(0, presenceHours - 0.5);
        }

        const isCurrentlyInBreak = (now >= breakStart && now <= breakEnd && start <= breakStart);

        let totalEarned = 0;
        let currentRateText = "";
        let rateClass = "";

        if (totalHoursPassedNet <= standardPaidHours) {
            totalEarned = totalHoursPassedNet * baseWage;
            currentRateText = "תעריף: 100% (תקן)";
            rateClass = "rate-100";
        } else if (totalHoursPassedNet <= (standardPaidHours + 2)) {
            const regularEarnings = standardPaidHours * baseWage;
            const overtimeHours125 = totalHoursPassedNet - standardPaidHours;
            totalEarned = regularEarnings + (overtimeHours125 * (baseWage * 1.25));
            currentRateText = "תעריף: 125% 🚀";
            rateClass = "rate-125";
        } else {
            const regularEarnings = standardPaidHours * baseWage;
            const overtimeEarnings125 = 2 * (baseWage * 1.25);
            const overtimeHours150 = totalHoursPassedNet - (standardPaidHours + 2);
            totalEarned = regularEarnings + overtimeEarnings125 + (overtimeHours150 * (baseWage * 1.50));
            currentRateText = "תעריף: 150% 🔥";
            rateClass = "rate-150";
        }

        if (isCurrentlyInBreak) {
            currentRateText = "הפסקה (לא מתוגמל) ☕";
            rateClass = "rate-break";
        }

        moneyDisplay.textContent = `₪ ${Math.max(0, totalEarned).toFixed(2)}`;
        currentRateBadge.textContent = currentRateText;
        currentRateBadge.className = `rate-badge ${rateClass}`;

        let diffMs = targetStandardEnd - now;

        if (diffMs > 0) {
            timerLabel.textContent = "נותר לתקן:";
            timeTimerDisplay.style.color = "#e74c3c";
            formatAndDisplayTime(diffMs);
        } else {
            timerLabel.textContent = "שעות נוספות:";
            timeTimerDisplay.style.color = "var(--success-color)";
            formatAndDisplayTime(Math.abs(diffMs));
        }
    }

    function formatAndDisplayTime(ms) {
        const hrs = Math.floor(ms / (1000 * 60 * 60));
        const mins = Math.floor((ms % (1000 * 60 * 60)) / (1000 * 60));
        const secs = Math.floor((ms % (1000 * 60)) / 1000);
        timeTimerDisplay.textContent = `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    dayInput.addEventListener('change', calculate);
    setInterval(calculate, 1000);

    init();
</script>

</body>
</html>
